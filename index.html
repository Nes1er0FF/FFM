<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFM — музыкальный архив с поиском</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .sub {
            color: #888;
            margin-bottom: 2rem;
            border-left: 3px solid #2a6f3f;
            padding-left: 1rem;
        }

        /* поиск */
        .search-box {
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            background: #111;
            border: 1px solid #222;
            padding: 0.8rem 1rem;
            border-radius: 40px;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: #2a6f3f;
        }

        /* результаты поиска */
        .search-results {
            margin-bottom: 2rem;
            background: #0e0e0e;
            border-radius: 16px;
            padding: 1rem;
            display: none;
        }

        .search-results h3 {
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            color: #8bc34a;
        }

        .search-result-item {
            background: #111;
            padding: 0.7rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #222;
        }

        .search-result-item:hover {
            background: #1a1a1a;
            border-color: #2a6f3f;
        }

        .result-type {
            font-size: 0.7rem;
            color: #8bc34a;
            text-transform: uppercase;
            margin-bottom: 0.2rem;
        }

        .result-title {
            font-weight: 600;
        }

        .result-sub {
            font-size: 0.8rem;
            color: #888;
        }

        /* список исполнителей */
        .artist-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .artist-card {
            background: #111;
            border-radius: 12px;
            padding: 1rem 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .artist-card:hover {
            background: #1a1a1a;
            border-color: #2a6f3f;
        }

        .artist-name {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .artist-years {
            font-size: 0.85rem;
            color: #666;
        }

        /* карточка исполнителя */
        .artist-detail {
            display: none;
        }

        .detail-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .back-btn {
            background: #1e2a1f;
            color: #8bc34a;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .back-btn:hover {
            background: #2a3a2a;
        }

        .artist-title {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .artist-bio {
            color: #aaa;
            margin-bottom: 1.5rem;
            padding: 0.8rem;
            background: #0e0e0e;
            border-radius: 12px;
        }

        .album {
            background: #0e0e0e;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            border-left: 3px solid #2a6f3f;
        }

        .album-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }

        .album-year {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .track-name {
            font-size: 0.95rem;
        }

        audio {
            height: 32px;
            max-width: 200px;
        }

        .download-link {
            background: #1e2a1f;
            color: #8bc34a;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.75rem;
        }

        footer {
            text-align: center;
            color: #444;
            font-size: 0.8rem;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>FFM</h1>
    <div class="sub">архив музыки, который никто не отнимет</div>

    <!-- ПОИСК -->
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Искать исполнителей, альбомы, треки...">
    </div>

    <div id="searchResults" class="search-results"></div>

    <!-- список исполнителей -->
    <div id="artistListView">
        <div class="artist-list" id="artistList"></div>
    </div>

    <!-- карточка исполнителя -->
    <div id="artistDetailView" class="artist-detail"></div>

    <footer>
        FFM — локальный архив. Слушай. Скачивай. Помни.
    </footer>
</div>

<script>
    // ========== ДАННЫЕ ==========
    const artists = [
        {
            id: "unnv",
            name: "УННВ",
            years: "2010–н.в.",
            bio: "Андеграунд-рэп из Минска. Гении рифмы и метафор.",
            albums: [
                {
                    title: "Чёрная кассета",
                    year: 2013,
                    tracks: [
                        { name: "Первый трек", file: "music/unnv/1.mp3" },
                        { name: "Второй трек", file: "music/unnv/2.mp3" }
                    ]
                }
            ]
        },
        {
            id: "letov",
            name: "Егор Летов",
            years: "1964–2019",
            bio: "Лидер групп «Гражданская Оборона», «Егор и Опизденевшие». Голос поколения.",
            albums: [
                {
                    title: "Русское поле экспериментов",
                    year: 1989,
                    tracks: [
                        { name: "Всё идёт по плану", file: "music/letov/vsyo_idet_po_planu.mp3" }
                    ]
                }
            ]
        }
    ];

    // ========== ПОИСК ==========
    function search(query) {
        const q = query.toLowerCase().trim();
        if (!q) return [];

        const results = [];

        for (const artist of artists) {
            // поиск по исполнителю
            if (artist.name.toLowerCase().includes(q)) {
                results.push({
                    type: "artist",
                    artistId: artist.id,
                    title: artist.name,
                    subtitle: artist.years,
                    artistName: artist.name
                });
            }

            // поиск по альбомам и трекам
            for (const album of artist.albums) {
                if (album.title.toLowerCase().includes(q)) {
                    results.push({
                        type: "album",
                        artistId: artist.id,
                        albumTitle: album.title,
                        title: `Альбом: ${album.title}`,
                        subtitle: `${artist.name} (${album.year})`,
                        artistName: artist.name
                    });
                }

                for (const track of album.tracks) {
                    if (track.name.toLowerCase().includes(q)) {
                        results.push({
                            type: "track",
                            artistId: artist.id,
                            trackName: track.name,
                            trackFile: track.file,
                            albumTitle: album.title,
                            title: `🎵 ${track.name}`,
                            subtitle: `${artist.name} — ${album.title}`,
                            artistName: artist.name
                        });
                    }
                }
            }
        }

        return results;
    }

    function renderSearchResults(results) {
        const container = document.getElementById('searchResults');
        if (!container) return;

        if (!results.length) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'block';
        container.innerHTML = `<h3>🔎 Результаты поиска (${results.length})</h3>` + results.map(res => {
            let onclick = '';
            if (res.type === 'artist') {
                onclick = `showArtistDetail('${res.artistId}')`;
            } else if (res.type === 'album') {
                onclick = `showArtistDetail('${res.artistId}')`;
            } else if (res.type === 'track') {
                // для трека — открываем исполнителя + скролл до трека (упрощённо)
                onclick = `showArtistDetailAndScrollToTrack('${res.artistId}', '${escapeHtml(res.trackName)}')`;
            }
            return `<div class="search-result-item" onclick="${onclick}">
                        <div class="result-type">${res.type === 'artist' ? 'Исполнитель' : (res.type === 'album' ? 'Альбом' : 'Трек')}</div>
                        <div class="result-title">${escapeHtml(res.title)}</div>
                        <div class="result-sub">${escapeHtml(res.subtitle)}</div>
                    </div>`;
        }).join('');
    }

    function showArtistDetailAndScrollToTrack(artistId, trackName) {
        showArtistDetail(artistId);
        setTimeout(() => {
            const elements = document.querySelectorAll('.track-name');
            for (let el of elements) {
                if (el.innerText.includes(trackName)) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    break;
                }
            }
        }, 100);
    }

    // ========== ОТРИСОВКА ==========
    function renderArtistList() {
        const container = document.getElementById('artistList');
        if (!container) return;
        container.innerHTML = artists.map(artist => `
            <div class="artist-card" data-id="${artist.id}">
                <div>
                    <div class="artist-name">${escapeHtml(artist.name)}</div>
                    <div class="artist-years">${escapeHtml(artist.years)}</div>
                </div>
            </div>
        `).join('');

        document.querySelectorAll('.artist-card').forEach(card => {
            card.addEventListener('click', () => showArtistDetail(card.dataset.id));
        });
    }

    function showArtistDetail(artistId) {
        const artist = artists.find(a => a.id === artistId);
        if (!artist) return;

        const listView = document.getElementById('artistListView');
        const detailView = document.getElementById('artistDetailView');
        if (!listView || !detailView) return;

        const albumsHtml = artist.albums.map(album => `
            <div class="album">
                <div class="album-title">${escapeHtml(album.title)}</div>
                <div class="album-year">${album.year}</div>
                <div class="track-list">
                    ${album.tracks.map(track => `
                        <div class="track">
                            <span class="track-name">${escapeHtml(track.name)}</span>
                            <audio controls preload="metadata">
                                <source src="${track.file}" type="audio/mpeg">
                            </audio>
                            <a href="${track.file}" download class="download-link">↓ скачать</a>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');

        detailView.innerHTML = `
            <div class="detail-header">
                <button class="back-btn" id="backToListBtn">← назад</button>
                <span class="artist-title">${escapeHtml(artist.name)}</span>
            </div>
            <div class="artist-bio">${escapeHtml(artist.bio)}</div>
            ${albumsHtml}
        `;

        listView.style.display = 'none';
        detailView.style.display = 'block';

        document.getElementById('backToListBtn')?.addEventListener('click', () => {
            listView.style.display = 'block';
            detailView.style.display = 'none';
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('searchInput').value = '';
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // поиск при вводе
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const results = search(e.target.value);
        renderSearchResults(results);
        if (results.length) {
            document.getElementById('artistListView').style.display = 'block';
            document.getElementById('artistDetailView').style.display = 'none';
        }
    });

    renderArtistList();
</script>
</body>
</html>
